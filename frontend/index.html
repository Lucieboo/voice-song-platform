<!DOCTYPE html>
<html>

<body>

<h1>AI Voice Generator 🎤</h1>

<input id="text" placeholder="Enter text here">
<br><br>

<button onclick="generateVoice()">Generate Voice</button>

<br><br>

<audio id="audio" controls></audio>

<script>

async function generateVoice(){

const text = document.getElementById("text").value

const response = await fetch(fetch("https://voice-song-platform.onrender.com/generate-voice"), {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({text})
})

const blob = await response.blob()

const audioURL = URL.createObjectURL(blob)

document.getElementById("audio").src = audioURL

}

</script>

</body>

</html>
