<!DOCTYPE html>
<html>

<body style="font-family:sans-serif; text-align:center; padding:50px">

<h1>🎤 AI Voice Generator</h1>

<input id="text" placeholder="Type something..." style="width:300px; padding:10px">
<br><br>

<button onclick="generateVoice()" style="padding:10px 20px;">Generate Voice</button>

<br><br>

<audio id="audio" controls></audio>
<br><br>

<a id="download" style="display:none;">Download Audio</a>

<script>

async function generateVoice(){

const text = document.getElementById("text").value

const response = await fetch("https://voice-song-platform.onrender.com/generate-voice", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({ text })
})

const blob = await response.blob()

const url = URL.createObjectURL(blob)

const audio = document.getElementById("audio")
audio.src = url
audio.play()

const download = document.getElementById("download")
download.href = url
download.download = "voice.mp3"
download.style.display = "block"
download.innerText = "⬇ Download Audio"

}

</script>

</body>

</html>
