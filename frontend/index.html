<!DOCTYPE html>
<html>

<head>
<title>AI Voice + Song Generator</title>
</head>

<body style="font-family:sans-serif; text-align:center; padding:40px">

<h1>🎤 AI Voice Generator</h1>

<input id="text" placeholder="Enter text..." style="width:300px; padding:10px">
<br><br>

<button onclick="generateVoice()">Generate Voice</button>

<br><br>

<audio id="audio" controls></audio>
<br><br>

<a id="downloadVoice" style="display:none;">Download Voice</a>

<hr><br>

<h1>🎶 AI Song Generator</h1>

<textarea id="lyrics" placeholder="Write lyrics..." style="width:300px; height:100px;"></textarea>
<br><br>

<button onclick="generateSong()">Generate Song</button>

<br><br>

<audio id="songAudio" controls></audio>
<br><br>

<a id="downloadSong" style="display:none;">Download Song</a>

<script>

const BACKEND_URL = "https://voice-song-platform.onrender.com"

// 🎤 TEXT TO SPEECH
async function generateVoice(){

const text = document.getElementById("text").value

if(!text){
alert("Enter text")
return
}

const response = await fetch(BACKEND_URL + "/generate-voice", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({ text })
})

const blob = await response.blob()

const url = URL.createObjectURL(blob)

const audio = document.getElementById("audio")
audio.src = url
audio.play()

const download = document.getElementById("downloadVoice")
download.href = url
download.download = "voice.mp3"
download.style.display = "block"
download.innerText = "⬇ Download Voice"

}


// 🎶 SONG GENERATOR
async function generateSong(){

const lyrics = document.getElementById("lyrics").value

if(!lyrics){
alert("Enter lyrics")
return
}

const response = await fetch(BACKEND_URL + "/generate-song", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({ lyrics })
})

const blob = await response.blob()

const url = URL.createObjectURL(blob)

const audio = document.getElementById("songAudio")
audio.src = url
audio.play()

const download = document.getElementById("downloadSong")
download.href = url
download.download = "song.wav"
download.style.display = "block"
download.innerText = "⬇ Download Song"

}

</script>

</body>

</html>
