<!DOCTYPE html>
<html>

<head>
<title>AI Studio</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    display: flex;
    background: #0f172a;
    color: white;
}

/* SIDEBAR */
.sidebar {
    width: 200px;
    background: #020617;
    height: 100vh;
    padding: 20px;
}

.sidebar button {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    background: #1e293b;
    color: white;
    border: none;
    border-radius: 6px;
}

/* MAIN */
.main {
    flex: 1;
    padding: 40px;
}

.box {
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
    max-width: 500px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 6px;
    border: none;
}

button {
    margin-top: 10px;
    padding: 10px;
    width: 100%;
    background: #3b82f6;
    border: none;
    color: white;
    border-radius: 6px;
}
</style>

</head>

<body>

<div class="sidebar">
    <button onclick="show('auth')">👤 Login</button>
    <button onclick="show('voice')">🎤 Voice</button>
    <button onclick="show('song')">🎶 Song</button>
    <button onclick="show('image')">🖼️ Image</button>
</div>

<div class="main">

<!-- AUTH -->
<div id="authBox" class="box">
<h2>Login / Signup</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>

</div>

<!-- VOICE -->
<div id="voiceBox" class="box" style="display:none;">
<input id="text" placeholder="Text">
<button onclick="generateVoice()">Generate</button>
<audio id="audio" controls></audio>
</div>

<!-- SONG -->
<div id="songBox" class="box" style="display:none;">
<textarea id="lyrics"></textarea>
<button onclick="generateSong()">Generate</button>
<audio id="songAudio" controls></audio>
</div>

<!-- IMAGE -->
<div id="imageBox" class="box" style="display:none;">
<input id="prompt">
<button onclick="generateImage()">Generate</button>
<img id="img" width="100%">
</div>

</div>

<script>

const API = "https://voice-song-platform.onrender.com"

function show(tab){
document.getElementById("authBox").style.display = tab==="auth"?"block":"none"
document.getElementById("voiceBox").style.display = tab==="voice"?"block":"none"
document.getElementById("songBox").style.display = tab==="song"?"block":"none"
document.getElementById("imageBox").style.display = tab==="image"?"block":"none"
}

// AUTH
async function signup(){
await fetch(API+"/signup",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
email:email.value,
password:password.value
})
})
alert("Signup done")
}

async function login(){
const res = await fetch(API+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
email:email.value,
password:password.value
})
})
alert("Login done")
}

// VOICE
async function generateVoice(){
const res = await fetch(API+"/generate-voice",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({text:text.value})
})
audio.src = URL.createObjectURL(await res.blob())
}

// SONG
async function generateSong(){
const res = await fetch(API+"/generate-song",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({lyrics:lyrics.value})
})
songAudio.src = URL.createObjectURL(await res.blob())
}

// IMAGE
async function generateImage(){
const res = await fetch(API+"/generate-image",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({prompt:prompt.value})
})
img.src = URL.createObjectURL(await res.blob())
}

</script>

</body>
</html>
