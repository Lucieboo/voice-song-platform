<!DOCTYPE html>
<html>

<head>
<title>AI Voice & Song Studio</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 40px;
}

.container {
    max-width: 500px;
    margin: auto;
}

h1 {
    margin-bottom: 20px;
}

.tabs button {
    padding: 10px 20px;
    margin: 5px;
    border: none;
    cursor: pointer;
    background: #1e293b;
    color: white;
    border-radius: 8px;
}

.tabs button.active {
    background: #3b82f6;
}

.box {
    margin-top: 20px;
    padding: 20px;
    background: #1e293b;
    border-radius: 12px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
}

button.generate {
    margin-top: 15px;
    padding: 12px;
    width: 100%;
    background: #3b82f6;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

button.generate:hover {
    background: #2563eb;
}

.loader {
    display: none;
    margin-top: 10px;
}
</style>

</head>

<body>

<div class="container">

<h1>🎤 AI Voice & Song Studio</h1>

<div class="tabs">
    <button onclick="switchTab('voice')" id="voiceTab" class="active">Voice</button>
    <button onclick="switchTab('song')" id="songTab">Song</button>
</div>

<!-- VOICE -->
<div id="voiceBox" class="box">

<input id="text" placeholder="Enter text...">

<button class="generate" onclick="generateVoice()">Generate Voice</button>

<div class="loader" id="voiceLoader">⏳ Generating...</div>

<audio id="audio" controls></audio>

</div>

<!-- SONG -->
<div id="songBox" class="box" style="display:none;">

<textarea id="lyrics" placeholder="Write lyrics..."></textarea>

<button class="generate" onclick="generateSong()">Generate Song</button>

<div class="loader" id="songLoader">⏳ Creating music...</div>

<audio id="songAudio" controls></audio>

</div>

</div>

<script>

const BACKEND_URL = "https://voice-song-platform.onrender.com"

// TAB SWITCH
function switchTab(tab){

document.getElementById("voiceBox").style.display = tab === "voice" ? "block" : "none"
document.getElementById("songBox").style.display = tab === "song" ? "block" : "none"

document.getElementById("voiceTab").classList.remove("active")
document.getElementById("songTab").classList.remove("active")

document.getElementById(tab + "Tab").classList.add("active")
}


// 🎤 VOICE
async function generateVoice(){

const text = document.getElementById("text").value
if(!text) return alert("Enter text")

document.getElementById("voiceLoader").style.display = "block"

const response = await fetch(BACKEND_URL + "/generate-voice", {
method: "POST",
headers: {"Content-Type": "application/json"},
body: JSON.stringify({ text })
})

const blob = await response.blob()
const url = URL.createObjectURL(blob)

document.getElementById("audio").src = url
document.getElementById("audio").play()

document.getElementById("voiceLoader").style.display = "none"
}


// 🎶 SONG
async function generateSong(){

const lyrics = document.getElementById("lyrics").value
if(!lyrics) return alert("Enter lyrics")

document.getElementById("songLoader").style.display = "block"

const response = await fetch(BACKEND_URL + "/generate-song", {
method: "POST",
headers: {"Content-Type": "application/json"},
body: JSON.stringify({ lyrics })
})

const blob = await response.blob()
const url = URL.createObjectURL(blob)

document.getElementById("songAudio").src = url
document.getElementById("songAudio").play()

document.getElementById("songLoader").style.display = "none"
}

</script>

</body>
</html>
